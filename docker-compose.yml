version: "3"

services:

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: backend_container
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_container
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
